<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Khám phá và tìm kiếm thông tin về các loài Pokemon với giao diện đẹp mắt, hiện đại và dữ liệu thời gian thực từ PokeAPI.">
    <title>Pokedex - Premium Pokemon Database</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container"></div>
    
    <header class="app-header">
        <div class="logo-container">
            <div class="pokeball-logo"></div>
            <h1>Poké<span>dex</span></h1>
        </div>
        <p class="subtitle">Khám phá thế giới Pokémon kỳ diệu</p>
    </header>

    <main class="app-container">
        <!-- Search and Filter Controls -->
        <section class="controls-section">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Tìm kiếm theo tên hoặc ID..." autocomplete="off">
                <button id="clear-search" class="clear-btn" aria-label="Clear search"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="filters-wrapper">
                <div class="dropdown-filter">
                    <button id="type-filter-btn" class="filter-btn">
                        <span id="selected-type-text">Tất cả hệ</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div id="type-dropdown-menu" class="dropdown-menu">
                        <!-- Types will be populated dynamically -->
                    </div>
                </div>

                <div class="dropdown-filter">
                    <button id="sort-filter-btn" class="filter-btn">
                        <span id="selected-sort-text">ID: Tăng dần</span>
                        <i class="fa-solid fa-sort"></i>
                    </button>
                    <div id="sort-dropdown-menu" class="dropdown-menu">
                        <div class="dropdown-item active" data-sort="id-asc">ID: Tăng dần</div>
                        <div class="dropdown-item" data-sort="id-desc">ID: Giảm dần</div>
                        <div class="dropdown-item" data-sort="name-asc">Tên: A - Z</div>
                        <div class="dropdown-item" data-sort="name-desc">Tên: Z - A</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Active Filters Display -->
        <div id="active-filters" class="active-filters-container"></div>

        <!-- Pokemon Grid -->
        <section id="pokemon-grid" class="pokemon-grid">
            <!-- Loading Skeletons will appear here initially -->
        </section>
        
        <!-- Loading Spinner for Infinite Scroll -->
        <div id="infinite-loader" class="infinite-loader hidden">
            <div class="loader-spinner"></div>
            <p>Đang tải thêm Pokémon...</p>
        </div>
    </main>

    <!-- Pokemon Details Modal -->
    <div id="pokemon-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button id="close-modal-btn" class="close-modal-btn" aria-label="Close modal">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <div class="modal-header-background">
                <div class="modal-pokeball-bg"></div>
            </div>

            <div class="modal-body">
                <!-- Modal content will be dynamically generated by app.js -->
                <div class="modal-loading">
                    <div class="loader-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>&copy; 2026 Pokedex App. Phát triển với <i class="fa-solid fa-heart" style="color: #ff4a5a;"></i> bằng PokéAPI.</p>
    </footer>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
